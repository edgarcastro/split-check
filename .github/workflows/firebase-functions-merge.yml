name: Deploy Firebase Functions on merge
'on':
  push:
    branches:
      - main
    paths:
      - 'functions/**'
      - '.github/workflows/firebase-functions-merge.yml'
      - '.github/workflows/firebase-functions-pull-request.yml'
jobs:
  deploy_functions:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Create venv and install dependencies
        run: |
          cd functions
          python3.13 -m venv venv
          . venv/bin/activate && python3.13 -m pip install -r requirements.txt
      - name: Deploy Functions
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SPLIT_CHECK_41CB9 }}'
          PROJECT_ID: split-check-41cb9
