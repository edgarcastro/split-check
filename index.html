<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary metadata -->
    <title>Split Check – Split Restaurant Bills Easily</title>
    <meta name="description" content="Split restaurant checks among friends. Add items, assign people, and see everyone's share instantly." />
    <meta name="application-name" content="Split Check" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- iOS / Apple home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Split Check" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Split Check" />
    <meta property="og:description" content="Split restaurant checks among friends. Add items, assign people, and see everyone's share instantly." />
    <meta property="og:image" content="/apple-touch-icon.svg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Split Check" />
    <meta name="twitter:description" content="Split restaurant checks among friends. Add items, assign people, and see everyone's share instantly." />
    <meta name="twitter:image" content="/apple-touch-icon.svg" />

    <!-- AdSense -->
    <meta name="google-adsense-account" content="ca-pub-9520548155007653">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9520548155007653" crossorigin="anonymous"></script>

    <!-- Theme init (prevents flash of wrong theme) -->
    <script>
      (function () {
        const theme = localStorage.getItem('split-check-theme');
        if (
          theme === 'dark' ||
          (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)
        ) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
